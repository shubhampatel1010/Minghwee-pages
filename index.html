<!DOCTYPE html>
<html class="light" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>MingHwee Platform — Stitch Replica</title>

    <!-- Tailwind (Play CDN) with the exact merged Stitch design tokens -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
            "tertiary": "#522202",
            "on-error": "#ffffff",
            "tertiary-fixed-dim": "#ffb68d",
            "surface-container": "#ebeeee",
            "error": "#ba1a1a",
            "background": "#f7fafa",
            "on-tertiary": "#ffffff",
            "on-secondary": "#ffffff",
            "tertiary-container": "#6e3815",
            "on-tertiary-container": "#f0a377",
            "on-surface-variant": "#3f4849",
            "surface-tint": "#27676c",
            "primary-fixed": "#afedf3",
            "inverse-surface": "#2d3131",
            "on-surface": "#181c1d",
            "surface-dim": "#d7dbdb",
            "primary-container": "#004f54",
            "inverse-on-surface": "#eef1f1",
            "surface-container-high": "#e6e9e9",
            "on-primary-container": "#82bfc5",
            "on-error-container": "#93000a",
            "on-primary": "#ffffff",
            "on-secondary-fixed": "#1e1b14",
            "primary": "#00363a",
            "on-tertiary-fixed-variant": "#6e3815",
            "on-background": "#181c1d",
            "inverse-primary": "#94d1d6",
            "secondary-container": "#e8e2d5",
            "on-secondary-container": "#68645a",
            "surface-container-lowest": "#ffffff",
            "secondary": "#625e54",
            "on-secondary-fixed-variant": "#4a463d",
            "outline": "#707979",
            "surface-bright": "#f7fafa",
            "primary-fixed-dim": "#94d1d6",
            "surface-container-highest": "#e0e3e3",
            "secondary-fixed-dim": "#ccc6ba",
            "on-primary-fixed-variant": "#004f54",
            "on-primary-fixed": "#002022",
            "error-container": "#ffdad6",
            "surface": "#f7fafa",
            "tertiary-fixed": "#ffdbc9",
            "surface-container-low": "#f1f4f4",
            "outline-variant": "#bfc8c9",
            "surface-variant": "#e0e3e3",
            "secondary-fixed": "#e8e2d5",
            "on-tertiary-fixed": "#331200",
            "positive": "#00854d",
            "negative": "#cc3333"
            },
            borderRadius: {
            "DEFAULT": "0.25rem",
            "lg": "0.5rem",
            "xl": "0.75rem",
            "full": "9999px",
            "card": "12px"
            },
            spacing: {
            "stack-lg": "48px",
            "gutter": "24px",
            "unit": "8px",
            "margin-mobile": "20px",
            "stack-sm": "12px",
            "margin-desktop": "40px",
            "container-max": "1200px",
            "stack-md": "24px"
            },
            fontFamily: {
            "h1": ["Manrope"],
            "display": ["Manrope"],
            "body-md": ["Manrope"],
            "label-caps": ["Manrope"],
            "h2": ["Manrope"],
            "nav-label": ["Manrope"],
            "h3": ["Manrope"],
            "button": ["Manrope"],
            "body-lg": ["Manrope"],
            "caption": ["Manrope"],
            "manrope": ["Manrope", "sans-serif"]
            },
            fontSize: {
            "label-caps": ["12px", {"lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "700"}],
            "h3": ["20px", {"lineHeight": "1.4", "fontWeight": "600"}],
            "h2": ["24px", {"lineHeight": "1.3", "fontWeight": "600"}],
            "h1": ["32px", {"lineHeight": "1.2", "letterSpacing": "-0.01em", "fontWeight": "700"}],
            "button": ["15px", {"lineHeight": "1", "letterSpacing": "0.01em", "fontWeight": "600"}],
            "body-md": ["16px", {"lineHeight": "1.6", "fontWeight": "400"}],
            "display": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700"}],
            "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}],
            "nav-label": ["11px", {"lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "600"}],
            "caption": ["10px", {"lineHeight": "1", "fontWeight": "500"}]
            }
          }
        }
      };
    </script>

    <!-- Fonts: Manrope (UI) + Material Symbols Outlined (icons) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet" />

    <style>
      /* Base icon defaults shared by every Stitch screen */
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
